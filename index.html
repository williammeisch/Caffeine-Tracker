<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caffeine Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="sidebar">
    <h1 id="currentDate">Month</h1>
    <div class="card">
        <h3>Today: <span id="totalCaffeine">0</span>mg</h3>
        <h3>Recovery: <span id="sideScore">0%</span></h3>
    </div>
    <div class="card">
        <input type="text" id="caffeineSearch" list="drinkOptions" placeholder="Search Drink...">
        <datalist id="drinkOptions"></datalist>
        <input type="number" id="caffeineInput" placeholder="mg">
        <button onclick="addCaffeine()">Add Entry</button>
    </div>
    <div class="card">
        <input type="number" id="sleepInput" placeholder="Sleep Hours">
        <select id="sleepQuality"><option value="1.2">Deep</option><option value="1.0" selected>Avg</option><option value="0.7">Restless</option></select>
        <button onclick="setSleep()">Save Sleep</button>
    </div>
    <button onclick="resetDay()" style="background:#444; color:#ff6b6b">Reset All</button>
  </div>

  <main class="main-content">
    <div class="calendar-section">
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>
    <div class="quote-section">
      <h2 id="quoteText">Loading quote...</h2>
    </div>
  </main>
</body>
</html>
