<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recovery Tracker Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="sidebar">
    <h1>Recovery Tracker</h1>
    <span id="editingDateLabel">Editing: Today</span>
    <div class="card">
        <h2>Recovery</h2>
        <div id="sideScore" style="font-size:42px; font-weight:bold; color:#d4a373;">--</div>
        <div style="font-size:12px; color:#888;"><span id="totalCaffeine">0</span>mg Logged</div>
    </div>
    <div class="card">
        <h2>Log Caffeine</h2>
        <input type="text" id="caffeineSearch" placeholder="Search Red Bull, Ghost..." autocomplete="off">
        <div id="searchResults" class="search-dropdown" style="display: none;"></div>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <input type="number" id="caffeineInput" placeholder="mg">
            <button onclick="addCaffeine()" style="width:60px; padding:0;">Add</button>
        </div>
        <div id="caffeineLogList" style="margin-top:10px; font-size:11px; color:#aaa;"></div>
    </div>
    <div class="card">
        <h2>Sleep & Exercise</h2>
        <select id="exerciseSelect"><option value="0">No Exercise</option><option value="15">Moderate</option><option value="30">Intense</option></select>
        <input type="number" id="sleepInput" placeholder="Sleep Hours">
        <select id="sleepQuality"><option value="1.2">Deep</option><option value="1.0" selected>Average</option><option value="0.7">Restless</option></select>
        <button onclick="submitDailyProfile()" style="margin-top:10px;">Submit Day</button>
    </div>
    <button onclick="resetDayData()" class="reset-btn">Reset Today</button>
  </div>
  <main class="main-content">
    <div class="calendar-section">
      <div class="calendar-nav">
        <button onclick="changeMonth(-1)">&#10094;</button>
        <h2 id="currentMonthHeader"></h2>
        <button onclick="changeMonth(1)">&#10095;</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>
    <div id="dailyFeedback" class="feedback-box" style="display: none;"><span id="feedbackText"></span></div>
    <div class="info-footer">
        <div class="info-card">
            <h3>Recovery Logic</h3>
            <p>100% baseline minus caffeine penalties (>200mg), sleep deficits, and strain.</p>
            <div class="disclaimer-line">Informational purposes only. Use your own judgment. Not medical advice.</div>
        </div>
    </div>
  </main>
</body>
</html>
